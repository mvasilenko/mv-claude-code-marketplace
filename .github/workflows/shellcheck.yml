name: shellcheck

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".shellcheckrc"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
